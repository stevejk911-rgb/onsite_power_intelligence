<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>On-Site Power Intelligence — Admin</title>
<style>
  :root{
    --ink:#0b1220;--body:#2b3340;--muted:#6b7480;--line:#e9ecf1;
    --blue:#1657e0;--blue-soft:#eef3ff;--green:#1f9d57;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#f7f8fa;color:var(--body);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}

  .top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .top .in{max-width:840px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
  .brand{font-size:12px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--blue)}
  .brand span{color:var(--muted)}
  .who{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:14px}
  .who b{color:var(--ink)}
  .lock{font-size:12.5px;color:var(--blue);font-weight:600;cursor:pointer;background:none;border:0;padding:0}

  .wrap{max-width:840px;margin:0 auto;padding:30px 24px 70px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;margin:0 0 18px}
  .h{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:0}
  .h span{color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0}
  .count{font-size:13px;color:var(--muted)}
  .count b{color:var(--ink);font-size:15px}

  .panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:4px 0 4px}

  .fb{padding:16px 22px;border-bottom:1px solid #f1f3f6}
  .fb:last-child{border-bottom:0}
  .fb .top2{display:flex;align-items:center;justify-content:space-between}
  .fb .who2{font-size:13.5px;font-weight:600;color:var(--ink)}
  .fb .who2 span{color:var(--muted);font-weight:500}
  .fb .t{font-size:12px;color:var(--muted)}
  .fb .msg{font-size:14.5px;color:var(--ink);margin-top:7px;line-height:1.5}
  .fb .ctx{font-size:11.5px;color:var(--muted);margin-top:6px}
  .empty{padding:30px 22px;font-size:14px;color:var(--muted);line-height:1.55;text-align:center}
  .mono{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="top"><div class="in">
  <div class="brand">On-Site Power Intelligence <span>· Admin</span></div>
  <div class="who"><span>Signed in as <b>Steve</b></span><button class="lock" id="relock" onclick="changeKey()" style="display:none">Change key</button></div>
</div></div>

<div class="wrap">
  <div class="head">
    <p class="h">Feedback inbox <span>· one-line notes left on the site</span></p>
    <div class="count"><b id="kpiFb">—</b> total</div>
  </div>
  <div class="panel">
    <div id="fbList"><div class="empty">Loading…</div></div>
  </div>
</div>

<script>
  var KEYNAME="opi_admin_key";
  function storedKey(){ try{ return localStorage.getItem(KEYNAME)||""; }catch(e){ return ""; } }
  function saveKey(k){ try{ localStorage.setItem(KEYNAME,k); }catch(e){} }
  function clearKey(){ try{ localStorage.removeItem(KEYNAME); }catch(e){} }
  function initialKey(){
    var fromUrl=new URLSearchParams(location.search).get("key");
    if(fromUrl){ saveKey(fromUrl); history.replaceState(null,"",location.pathname); return fromUrl; }
    return storedKey();
  }
  function changeKey(){
    var k=prompt("Enter admin key");
    if(k){ saveKey(k); loadFeedback(k); }
  }

  function esc(s){ return String(s||"").replace(/[&<>"]/g,function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
  function rel(ts){
    var t=new Date(ts).getTime(); if(!isFinite(t)) return "";
    var s=Math.max(0,(Date.now()-t)/1000);
    if(s<60) return "just now";
    if(s<3600) return Math.floor(s/60)+"m ago";
    if(s<86400) return Math.floor(s/3600)+"h ago";
    if(s<604800) return Math.floor(s/86400)+"d ago";
    return new Date(ts).toLocaleDateString();
  }
  function fbItemHTML(it){
    var loc=(typeof it.lat==="number" && typeof it.lng==="number") ? (it.lat.toFixed(2)+", "+it.lng.toFixed(2)) : "site";
    return '<div class="fb"><div class="top2">'
      + '<div class="who2">Visitor <span>· '+esc(loc)+'</span></div>'
      + '<div class="t">'+rel(it.ts)+'</div></div>'
      + '<div class="msg">'+esc(it.text)+'</div>'
      + (it.verdict?('<div class="ctx">on: '+esc(it.verdict)+'</div>'):'')
      + '</div>';
  }
  function render(items){
    document.getElementById("relock").style.display="";
    var kpi=document.getElementById("kpiFb"); if(kpi) kpi.textContent=String(items.length);
    var list=document.getElementById("fbList");
    if(!items.length){
      list.innerHTML='<div class="empty">No feedback yet. One-line notes left on the site land here.</div>';
      return;
    }
    list.innerHTML=items.map(fbItemHTML).join("");
  }
  function loadFeedback(key){
    fetch("/api/admin/feedback"+(key?("?key="+encodeURIComponent(key)):""))
      .then(function(r){ if(r.status===401) throw new Error("locked"); return r.json(); })
      .then(function(d){ render((d&&d.items)||[]); })
      .catch(function(e){
        if(e&&e.message==="locked"){
          clearKey();
          var k=prompt("This admin page is locked. Enter the admin key:");
          if(k){ saveKey(k); loadFeedback(k); return; }
          document.getElementById("fbList").innerHTML='<div class="empty">Locked. Reload and enter the admin key, or open as <span class="mono">admin.html?key=YOUR_ADMIN_KEY</span>.</div>';
          document.getElementById("kpiFb").textContent="—";
        } else {
          document.getElementById("fbList").innerHTML='<div class="empty">Could not load feedback right now.</div>';
        }
      });
  }
  loadFeedback(initialKey());
</script>
</body>
</html>
